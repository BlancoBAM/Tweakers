name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libslint-dev

    - name: Build
      run: cargo build --release

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: tweakers-binary
        path: target/release/tweakers

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libslint-dev

    - name: Build
      run: cargo build --release

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: target/release/tweakers
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}