name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config libssl-dev libgtk-3-dev libwebp-dev \
          libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          patchelf curl file wget

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Build release binary
      run: cargo build --release

    - name: Build .deb package
      run: cargo deb

    - name: Install linuxdeploy tools (extracted, not AppImage-in-AppImage)
      run: |
        # Pull the pre-extracted linuxdeploy binaries from the GitHub release assets
        # Using the "continuous" release which provides plain tarballs alongside AppImages
        mkdir -p "$HOME/.local/bin"

        # Download linuxdeploy x86_64 AppImage and extract it so FUSE is not needed
        wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" \
          -O /tmp/linuxdeploy.AppImage
        chmod +x /tmp/linuxdeploy.AppImage
        cd /tmp && ./linuxdeploy.AppImage --appimage-extract > /dev/null
        sudo cp -r squashfs-root/. /usr/local/
        rm -rf squashfs-root /tmp/linuxdeploy.AppImage

        # Download linuxdeploy-plugin-appimage and extract it
        wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage" \
          -O /tmp/linuxdeploy-plugin-appimage.AppImage
        chmod +x /tmp/linuxdeploy-plugin-appimage.AppImage
        cd /tmp && ./linuxdeploy-plugin-appimage.AppImage --appimage-extract > /dev/null
        sudo cp squashfs-root/usr/bin/linuxdeploy-plugin-appimage /usr/local/bin/
        rm -rf squashfs-root /tmp/linuxdeploy-plugin-appimage.AppImage

        # Verify both tools are now available
        which linuxdeploy
        which linuxdeploy-plugin-appimage

    - name: Assemble AppDir
      run: |
        APPDIR="AppDir"
        rm -rf "$APPDIR"
        mkdir -p \
          "$APPDIR/usr/bin" \
          "$APPDIR/usr/share/applications" \
          "$APPDIR/usr/share/icons/hicolor/scalable/apps" \
          "$APPDIR/usr/share/icons/hicolor/256x256/apps" \
          "$APPDIR/usr/share/metainfo"

        cp target/release/tweakers       "$APPDIR/usr/bin/"
        cp tweakers.desktop              "$APPDIR/usr/share/applications/"
        cp icon.svg                      "$APPDIR/usr/share/icons/hicolor/scalable/apps/tweakers.svg"
        cp com.lilithlinux.tweakers.metainfo.xml "$APPDIR/usr/share/metainfo/"

        # Generate a raster icon for linuxdeploy (requires at least one PNG)
        sudo apt-get install -y librsvg2-bin
        rsvg-convert -w 256 -h 256 icon.svg -o "$APPDIR/usr/share/icons/hicolor/256x256/apps/tweakers.png"

    - name: Build AppImage
      env:
        ARCH: x86_64
        NO_STRIP: 1
      run: |
        linuxdeploy \
          --appdir AppDir \
          --desktop-file tweakers.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/tweakers.png \
          --output appimage

    - name: Rename artifacts
      run: |
        mkdir -p dist
        DEB=$(find target/debian -name '*.deb' | head -1)
        TAG="${GITHUB_REF_NAME:-latest}"
        cp "$DEB" "dist/tweakers-${TAG}-amd64.deb"

        APPIMAGE=$(find . -maxdepth 1 -name '*.AppImage' | head -1)
        cp "$APPIMAGE" "dist/Tweakers-${TAG}-x86_64.AppImage"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tweakers-release-packages
        path: dist/*

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/tweakers-*.deb
          dist/Tweakers-*.AppImage
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}