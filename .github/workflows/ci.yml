name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config libssl-dev libgtk-3-dev libwebp-dev \
          libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          patchelf curl file
    
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Build release binary and DEB
      run: |
        cargo build --release
        cargo deb

    - name: Download linuxdeploy and appimage plugin
      run: |
        # Download linuxdeploy
        curl -fsSL -o linuxdeploy \
          "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        chmod +x linuxdeploy
        ./linuxdeploy --appimage-extract
        sudo mkdir -p /usr/local/share/linuxdeploy
        sudo mv squashfs-root/* /usr/local/share/linuxdeploy/
        rm -rf squashfs-root linuxdeploy
        
        # Create self-contained wrapper for linuxdeploy
        echo '#!/bin/sh' | sudo tee /usr/local/bin/linuxdeploy
        echo 'exec /usr/local/share/linuxdeploy/AppRun "$@"' | sudo tee -a /usr/local/bin/linuxdeploy
        sudo chmod +x /usr/local/bin/linuxdeploy

        # Download linuxdeploy-plugin-appimage
        curl -fsSL -o linuxdeploy-plugin-appimage \
          "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
        chmod +x linuxdeploy-plugin-appimage
        ./linuxdeploy-plugin-appimage --appimage-extract
        sudo mkdir -p /usr/local/share/linuxdeploy-plugin-appimage
        sudo mv squashfs-root/* /usr/local/share/linuxdeploy-plugin-appimage/
        rm -rf squashfs-root linuxdeploy-plugin-appimage

        # Create self-contained wrapper for the appimage plugin
        echo '#!/bin/sh' | sudo tee /usr/local/bin/linuxdeploy-plugin-appimage
        echo 'exec /usr/local/share/linuxdeploy-plugin-appimage/AppRun "$@"' | sudo tee -a /usr/local/bin/linuxdeploy-plugin-appimage
        sudo chmod +x /usr/local/bin/linuxdeploy-plugin-appimage

    - name: Assemble AppDir
      run: |
        APPDIR="AppDir"
        rm -rf "$APPDIR"
        mkdir -p \
          "$APPDIR/usr/bin" \
          "$APPDIR/usr/share/applications" \
          "$APPDIR/usr/share/icons/hicolor/scalable/apps"

        cp target/release/tweakers "$APPDIR/usr/bin/"
        cp tweakers.desktop "$APPDIR/usr/share/applications/"
        cp icon.svg "$APPDIR/usr/share/icons/hicolor/scalable/apps/tweakers.svg"

    - name: Build AppImage
      run: |
        ARCH=x86_64 linuxdeploy \
          --appdir AppDir \
          --desktop-file tweakers.desktop \
          --icon-file icon.svg \
          --output appimage
      env:
        APPIMAGE_EXTRACT_AND_RUN: 1

    - name: Organize artifacts
      run: |
        mkdir -p dist
        # Copy deb package
        DEB=$(find target/debian -name '*.deb' | head -1)
        cp "$DEB" dist/tweakers-latest-amd64.deb
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cp "$DEB" "dist/tweakers-${TAG_NAME}-amd64.deb"
        fi
        
        # Copy AppImage
        APPIMAGE=$(find . -maxdepth 1 -name '*.AppImage' | head -1)
        cp "$APPIMAGE" dist/Tweakers-latest-x86_64.AppImage
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cp "$APPIMAGE" "dist/Tweakers-${TAG_NAME}-x86_64.AppImage"
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tweakers-release-packages
        path: dist/*

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/tweakers-*.deb
          dist/Tweakers-*.AppImage
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}