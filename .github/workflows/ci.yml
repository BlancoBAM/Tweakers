name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config libssl-dev \
          libxkbcommon-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          libgtk-3-dev libwebp-dev

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Build release binary
      run: cargo build --release

    - name: Build .deb package
      run: cargo deb

    - name: Stage artifact
      run: |
        mkdir -p dist
        TAG="${GITHUB_REF_NAME:-latest}"
        DEB=$(find target/debian -name '*.deb' | head -1)
        cp "$DEB" "dist/tweakers-${TAG}-amd64.deb"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: tweakers-deb
        path: dist/*.deb

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/tweakers-*.deb
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}